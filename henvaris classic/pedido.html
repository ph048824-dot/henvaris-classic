<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finalizar Pedido | Henvaris Classic</title>

<link rel="stylesheet" href="pedido.css">

</head>

<body>

<div class="pedido-container">

<h1>Finalizar Pedido</h1>

<div class="resumo">

<h2>Resumo do Pedido</h2>

<div id="lista-produtos"></div>

<h3>Total: R$ <span id="valor-total">0,00</span></h3>

</div>

<form id="pedidoForm"
      action="https://formsubmit.co/ph048824@gmail.com"
      method="POST">

<input type="hidden" name="_subject" value="🛒 Novo Pedido - Henvaris Classic">

<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_template" value="table">

<input type="hidden" id="produtos" name="Produtos">
<input type="hidden" name="_next" value="https://formsubmit.co/thanks">
<h2>Dados do Cliente</h2>

<input
type="text"
id="nome"
name="Nome"
placeholder="Nome Completo"
required>

<input
type="tel"
id="telefone"
name="Telefone"
placeholder="WhatsApp"
required>

<input
type="email"
id="email"
name="Email"
placeholder="E-mail">

<h2>Endereço</h2>

<input
type="text"
id="cep"
name="CEP"
placeholder="CEP"
maxlength="9"
onblur="buscarCEP()"
required>

<input
type="text"
id="rua"
name="Rua"
placeholder="Rua"
required>

<input
type="text"
id="numero"
name="Número"
placeholder="Número"
required>

<input
type="text"
id="complemento"
name="Complemento"
placeholder="Complemento">

<input
type="text"
id="bairro"
name="Bairro"
placeholder="Bairro"
required>

<input
type="text"
id="cidade"
name="Cidade"
placeholder="Cidade"
required>

<input
type="text"
id="estado"
name="Estado"
placeholder="Estado"
required>

<textarea
id="observacao"
name="Observações"
placeholder="Observações"></textarea>

<button type="submit">
Enviar Pedido
</button>

</form>

</div>

<script src="pedido.js"></script>

</body>

</html>
